# Local development entry point: wifi + token from secrets.yaml.
# End users adopting via the ESPHome builder should import
# clawd-bot.package.yaml instead - see README.md.

substitutions:
  claude_token: !secret claude_token

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    password: !secret ap_password

packages:
  clawd_bot: !include clawd-bot.package.yaml
