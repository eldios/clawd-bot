# Local development entry point: wifi + token from secrets.yaml, board
# picked here. End users adopting via the ESPHome builder import a file
# from boards/ instead - see README.md.

substitutions:
  claude_token: !secret claude_token
  # Local dev: in-repo component sources instead of GitHub.
  clawd_components_source: "components"
  # Local dev: repo sprites instead of the GitHub raw URLs.
  saver_cloud_file: "assets/sprites/cloud.png"
  saver_moon_file: "assets/sprites/moon.png"
  saver_wave_file: "assets/sprites/wave.png"
  saver_boat_r_file: "assets/sprites/boat-big-r.png"
  saver_boat_l_file: "assets/sprites/boat-big-l.png"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    password: !secret ap_password

packages:
  board: !include boards/m5stack-cores3.yaml
  # lang: !include lang/it.yaml

api:

ota:
  - platform: esphome

captive_portal:
