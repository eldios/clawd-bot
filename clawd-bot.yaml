# Local development entry point: wifi + token from secrets.yaml, board
# picked here. End users adopting via the ESPHome builder import a file
# from boards/ instead - see README.md.

substitutions:
  claude_token: !secret claude_token

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    password: !secret ap_password

packages:
  board: !include boards/m5stack-cores3.yaml
