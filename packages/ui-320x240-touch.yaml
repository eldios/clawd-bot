# Rich LVGL UI for 320x240 touch panels - the point of this project:
# readable from desk distance. Layout: status bar on top (status left,
# battery right), hero number + bars in the middle, detached bottom bar
# with polling info on the left and the refresh button on the right.
# All user-visible strings come from ${str_*} substitutions (see
# packages/common.yaml for the English defaults and lang/ for packs).

font:
  - file: "gfonts://Figtree@700"
    id: font_hero
    size: 88
    glyphs: "0123456789%?- "
  - file: "gfonts://Figtree@600"
    id: font_mid
    size: 26
  - file: "gfonts://Figtree@400"
    id: font_small
    size: 16

lvgl:
  id: main_lvgl
  displays: [main_lcd]
  touchscreens: [main_touch]
  buffer_size: 25%
  pages:
    - id: main_page
      bg_color: 0x000000
      widgets:
        # Full-page tap target (bottom of the z-order: real widgets stay
        # clickable on top): tapping empty screen area opens the saver.
        - obj:
            id: main_tap
            x: 0
            y: 0
            width: 100%
            height: 100%
            bg_opa: TRANSP
            border_width: 0
            on_click:
              - script.execute: toggle_saver
        # --- top status bar ---
        - label:
            id: lbl_status
            align: TOP_LEFT
            x: 8
            y: 6
            text_font: font_small
            text_color: 0x9A948A
            text: "${str_waiting}"
        - label:
            id: lbl_batt
            align: TOP_RIGHT
            x: -8
            y: 6
            text_font: font_small
            text_color: 0x9A948A
            text: ""
        # --- hero ---
        - label:
            id: lbl_hero
            align: TOP_MID
            y: 26
            text_font: font_hero
            text_color: 0xE8E4DC
            text: "--%"
        # --- bars ---
        - bar:
            id: bar_5h
            align: TOP_MID
            y: 122
            width: 280
            height: 14
            min_value: 0
            max_value: 100
            value: 0
            bg_color: 0x2A2A2A
            indicator:
              bg_color: 0xD97757
        - label:
            id: lbl_5h
            align: TOP_MID
            y: 140
            text_font: font_small
            text_color: 0x9A948A
            text: "5h - ${str_resets_in} --"
        - bar:
            id: bar_7d
            align: TOP_MID
            y: 164
            width: 280
            height: 14
            min_value: 0
            max_value: 100
            value: 0
            bg_color: 0x2A2A2A
            indicator:
              bg_color: 0x6A9BCC
        - label:
            id: lbl_7d
            align: TOP_MID
            y: 182
            text_font: font_small
            text_color: 0x9A948A
            text: "7d - ${str_resets_in} --"
        # --- bottom bar: info left, button right ---
        - label:
            id: lbl_footer
            align: BOTTOM_LEFT
            x: 8
            y: -14
            text_font: font_small
            text_color: 0x6A655D
            text: ""
        - button:
            id: btn_refresh
            align: BOTTOM_RIGHT
            x: -8
            y: -6
            width: 96
            height: 32
            widgets:
              - label:
                  text_font: font_small
                  text: "${str_refresh_btn}"
                  align: CENTER
            on_click:
              - script.execute: poll_usage

interval:
  # Refresh labels/bars once a second (countdowns tick, cheap on LVGL).
  - interval: 1s
    then:
      - lambda: |-
          char buf[48];
          if (!isnan(id(usage_5h).state)) {
            snprintf(buf, sizeof(buf), "%.0f%%", id(usage_5h).state);
            lv_label_set_text(id(lbl_hero), buf);
            lv_bar_set_value(id(bar_5h), (int) id(usage_5h).state, LV_ANIM_ON);
          }
          if (!isnan(id(usage_7d).state)) {
            lv_bar_set_value(id(bar_7d), (int) id(usage_7d).state, LV_ANIM_ON);
          }
          auto now = id(sntp_time).now();
          // Human-friendly countdown: days+hours over 48h, hours+minutes
          // over 1h, minutes only below.
          auto fmt_eta = [&](long reset_epoch, char *out, size_t n) {
            if (reset_epoch <= 0 || !now.is_valid()) { snprintf(out, n, "--"); return; }
            long left = reset_epoch - (long) now.timestamp;
            if (left < 0) left = 0;
            if (left >= 48 * 3600)     snprintf(out, n, "%ldd %ldh", left / 86400, (left % 86400) / 3600);
            else if (left >= 3600)     snprintf(out, n, "%ldh %02ldm", left / 3600, (left % 3600) / 60);
            else                       snprintf(out, n, "%ldm", left / 60);
          };
          char eta[24];
          fmt_eta(id(reset_5h_epoch), eta, sizeof(eta));
          lv_label_set_text_fmt(id(lbl_5h), "5h - ${str_resets_in} %s", eta);
          fmt_eta(id(reset_7d_epoch), eta, sizeof(eta));
          lv_label_set_text_fmt(id(lbl_7d), "7d - ${str_resets_in} %s", eta);
          // Status bar: refreshing state wins, then last status.
          if (id(poll_in_flight)) {
            lv_label_set_text(id(lbl_status), "${str_refreshing}");
          } else {
            const char *st = id(usage_status).has_state() ? id(usage_status).state.c_str() : "${str_waiting}";
            lv_label_set_text(id(lbl_status), st);
          }
          int batt = isnan(id(battery_level).state) ? -1 : (int) id(battery_level).state;
          if (batt >= 0) lv_label_set_text_fmt(id(lbl_batt), "${str_battery} %d%%", batt);
          else           lv_label_set_text(id(lbl_batt), "");
          // Bottom-left: polling cost, static per config.
          int toks_per_day = 86400 / ${poll_interval};
          lv_label_set_text_fmt(id(lbl_footer), "poll ${poll_interval}s | ~%d ${str_tok_day}", toks_per_day);
