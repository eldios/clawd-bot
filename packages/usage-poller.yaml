# Usage engine: minimal probe POST to /v1/messages, unified rate-limit
# headers read from the response. Runs in a dedicated FreeRTOS task (the
# clawd_poller external component) so the UI never stutters during the
# request - ESPHome's http_request action would block the main loop for
# the whole TLS+HTTP round trip.
# The cleaner GET api/oauth/usage endpoint rejects long-lived
# setup-tokens with 403 (tested 2026-07-21), so headers it is.

substitutions:
  # Where the clawd_poller component comes from. Pinned to the release
  # tag matching clawd_bot_version: a new release is a new ref, so the
  # component cache can never lag behind the packages (mixing a fresh
  # package with a stale component clone breaks validation). Local dev
  # entry points override this with the in-repo "components" directory.
  clawd_components_source: "github://eldios/clawd-bot@v${clawd_bot_version}"

external_components:
  - source: ${clawd_components_source}
    components: [clawd_poller]
    refresh: 1d

globals:
  - id: reset_5h_epoch
    type: long
    restore_value: no
    initial_value: "0"
  - id: reset_7d_epoch
    type: long
    restore_value: no
    initial_value: "0"
  - id: last_poll_ok
    type: bool
    restore_value: no
    initial_value: "false"
  - id: poll_in_flight
    type: bool
    restore_value: no
    initial_value: "false"
  # 0 = ok, 1 = near limit (allowed_warning), 2 = limit reached (rejected).
  # Numeric mirror of the unified status header for LED/UI consumers.
  - id: limit_level
    type: int
    restore_value: no
    initial_value: "0"

sensor:
  - platform: template
    id: usage_5h
    name: "Claude 5h Utilization"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: never
  - platform: template
    id: usage_7d
    name: "Claude 7d Utilization"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: never

text_sensor:
  - platform: template
    id: usage_status
    name: "Claude Limit Status"
    update_interval: never
  - platform: template
    id: anthropic_status
    name: "Anthropic Status"
    entity_category: diagnostic
    update_interval: never

clawd_poller:
  id: usage_probe
  token: ${claude_token}
  # Anthropic status page (statuspage.io indicator). "unknown" means the
  # check itself failed - keep the previous state rather than lying.
  on_anthropic_status:
    - lambda: |-
        if (indicator == "unknown") return;
        id(anthropic_status).publish_state(indicator);
        if (indicator == "none") {
          lv_obj_add_flag(id(status_dot), LV_OBJ_FLAG_HIDDEN);
        } else {
          uint32_t color = 0xF5D90A;                       // minor/maintenance
          if (indicator == "major")    color = 0xF76B15;
          if (indicator == "critical") color = 0xE5484D;
          lv_obj_set_style_bg_color(id(status_dot), lv_color_hex(color), 0);
          lv_obj_clear_flag(id(status_dot), LV_OBJ_FLAG_HIDDEN);
        }
  on_result:
    - lambda: |-
        if (code == 200) {
          if (u5 >= 0) id(usage_5h).publish_state(u5 * 100.0f);
          if (u7 >= 0) id(usage_7d).publish_state(u7 * 100.0f);
          id(reset_5h_epoch) = (long) r5;
          id(reset_7d_epoch) = (long) r7;
          // Localized display mapping for the unified status header.
          if (status == "allowed")              { id(limit_level) = 0; id(usage_status).publish_state("${str_status_ok}"); }
          else if (status == "allowed_warning") { id(limit_level) = 1; id(usage_status).publish_state("${str_status_warning}"); }
          else if (status == "rejected")        { id(limit_level) = 2; id(usage_status).publish_state("${str_status_limit}"); }
          else                                  { id(limit_level) = 0; id(usage_status).publish_state(status.empty() ? "${str_status_ok}" : status); }
          id(last_poll_ok) = true;
        } else if (code == 401 || code == 403) {
          id(usage_status).publish_state("${str_token_error}");
          id(last_poll_ok) = false;
        } else if (code == 0) {
          id(usage_status).publish_state("${str_net_error}");
          id(last_poll_ok) = false;
        } else {
          id(usage_status).publish_state("HTTP " + to_string(code));
          id(last_poll_ok) = false;
        }
        id(poll_in_flight) = false;

script:
  - id: poll_usage
    mode: single
    then:
      # Contract: every UI package provides lbl_status.
      - lambda: |-
          id(poll_in_flight) = true;
          lv_label_set_text(id(lbl_status), "${str_refreshing}");
      - clawd_poller.poll: usage_probe

interval:
  - interval: ${poll_interval}s
    startup_delay: 15s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - script.execute: poll_usage
  - interval: 15min
    startup_delay: 90s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - clawd_poller.check_status: usage_probe
