interval:
  # Screensaver animation. Only does work while the saver page is shown.
  - interval: 100ms
    then:
      - lambda: |-
          if (!id(saver_active)) return;
          static float t = 0.0f;
          t += 0.1f;
          lv_obj_t *scr = lv_scr_act();
          int W = lv_obj_get_width(scr);
          int H = lv_obj_get_height(scr);
          if (W <= 0 || H <= 0) return;
          // Water level = selected metric.
          float pct = 0.0f;
          if (id(saver_metric).state == "7d") {
            if (!isnan(id(usage_7d).state)) pct = id(usage_7d).state;
          } else {
            if (!isnan(id(usage_5h).state)) pct = id(usage_5h).state;
          }
          if (pct < 0) pct = 0;
          if (pct > 100) pct = 100;
          int water_h = (int)(H * pct / 100.0f);
          lv_obj_set_height(id(water_rect), water_h);
          int wl = H - water_h;   // waterline y from screen top
          // Boat: triangle sweep across the width, flipping the sprite
          // at each turn; bobs across the waterline unless the sea is full.
          const float period = 26.0f;
          float phase = fmodf(t, period) / period;
          bool moving_right = phase < 0.5f;
          float px = moving_right ? (phase * 2.0f) : (2.0f - phase * 2.0f);
          int bw = ${saver_boat_w};
          int bh = ${saver_boat_h};
          int x = (int)(px * (float)(W - bw));
          float bob_amp = (pct >= 99.0f) ? 2.0f : 6.0f;
          int hull = (int)(bh * 0.40f);   // how much hull sits in the water
          int y = wl - bh + hull + (int)(bob_amp * sinf(t * 1.3f));
          if (y > H - bh) y = H - bh;
          if (y < 0) y = 0;
          lv_obj_set_pos(id(img_boat), x, y);
          static bool was_right = true;
          if (moving_right != was_right) {
            was_right = moving_right;
            lv_image_set_src(id(img_boat), moving_right
                ? id(spr_boat_r)->get_lv_image_dsc()
                : id(spr_boat_l)->get_lv_image_dsc());
          }
          // Waves drift along the waterline.
          int drift = (int)(t * 10.0f) % 64;
          lv_obj_t *waves[6] = { id(img_wave_0), id(img_wave_1), id(img_wave_2),
                                 id(img_wave_3), id(img_wave_4), id(img_wave_5) };
          for (int i = 0; i < 6; i++) {
            lv_obj_set_pos(waves[i], i * 64 - drift, wl - 6);
          }
          // Clouds: count (0-16) and speed range come from HA config
          // entities; per-cloud speed interpolates min..max, phases stagger.
          lv_obj_t *clouds[16] = { id(img_cloud_0), id(img_cloud_1), id(img_cloud_2), id(img_cloud_3), id(img_cloud_4), id(img_cloud_5), id(img_cloud_6), id(img_cloud_7), id(img_cloud_8), id(img_cloud_9), id(img_cloud_10), id(img_cloud_11), id(img_cloud_12), id(img_cloud_13), id(img_cloud_14), id(img_cloud_15) };
          const float coff[16] = { 0.0f, 83.0f, 166.0f, 249.0f, 332.0f, 47.0f, 130.0f, 213.0f, 296.0f, 11.0f, 94.0f, 177.0f, 260.0f, 343.0f, 58.0f, 141.0f };
          const int   cy[16]   = { 4, 33, 6, 35, 8, 37, 10, 39, 12, 41, 14, 43, 16, 45, 18, 47 };
          int n_clouds = (int) id(saver_cloud_count).state;
          float smin = id(saver_cloud_speed_min).state;
          float smax = id(saver_cloud_speed_max).state;
          if (smax < smin) smax = smin;
          for (int i = 0; i < 16; i++) {
            if (i >= n_clouds) {
              lv_obj_add_flag(clouds[i], LV_OBJ_FLAG_HIDDEN);
              continue;
            }
            lv_obj_clear_flag(clouds[i], LV_OBJ_FLAG_HIDDEN);
            float sp = (n_clouds > 1) ? smin + (smax - smin) * i / (float)(n_clouds - 1)
                                      : (smin + smax) / 2.0f;
            int cx = (int)fmodf(t * sp + coff[i], (float)(W + 48)) - 48;
            lv_obj_set_pos(clouds[i], cx, cy[i]);
          }
          // Moon on/off.
          if (id(saver_moon).state) lv_obj_clear_flag(id(img_moon), LV_OBJ_FLAG_HIDDEN);
          else                      lv_obj_add_flag(id(img_moon), LV_OBJ_FLAG_HIDDEN);
          // Stars twinkle (count + on/off from HA); drown when the sea rises.
          lv_obj_t *stars[16] = { id(star_0), id(star_1), id(star_2), id(star_3), id(star_4), id(star_5), id(star_6), id(star_7), id(star_8), id(star_9), id(star_10), id(star_11), id(star_12), id(star_13), id(star_14), id(star_15) };
          bool stars_on = id(saver_stars).state;
          int n_stars = (int) id(saver_star_count).state;
          for (int i = 0; i < 16; i++) {
            int sy = lv_obj_get_y(stars[i]);
            if (!stars_on || i >= n_stars || sy >= wl - 4) {
              lv_obj_add_flag(stars[i], LV_OBJ_FLAG_HIDDEN);
            } else {
              lv_obj_clear_flag(stars[i], LV_OBJ_FLAG_HIDDEN);
              lv_opa_t opa = (lv_opa_t)(150 + 100 * sinf(t * (0.7f + 0.13f * i) + i * 2.1f));
              lv_obj_set_style_bg_opa(stars[i], opa, 0);
            }
          }
          // Big translucent percentage behind the scene.
          char buf[16];
          snprintf(buf, sizeof(buf), "%d%%", (int) pct);
          lv_label_set_text(id(lbl_saver_pct), buf);
