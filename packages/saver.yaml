script:
  - id: toggle_saver
    mode: single
    then:
      - script.execute: note_activity
      - if:
          condition:
            lambda: "return id(saver_active);"
          then:
            - lvgl.page.show: main_page
          else:
            - lvgl.page.show: saver_page

lvgl:
  pages:
    - id: saver_page
      # Pure black: near-black shades show row banding on some ST7789
      # panels (StickC Plus), and a night sky reads just as well in true
      # black on every display.
      bg_color: 0x000000
      # Wave tiles intentionally overflow the right edge; without this the
      # page turns scrollable and LVGL draws a drifting scrollbar.
      scrollbar_mode: "off"
      scrollable: false
      on_load:
        - lambda: "id(saver_active) = true;"
      on_unload:
        - lambda: "id(saver_active) = false;"
      widgets:
        # Full-page tap target: any touch leaves the screensaver.
        - obj:
            id: saver_tap
            x: 0
            y: 0
            width: 100%
            height: 100%
            bg_opa: TRANSP
