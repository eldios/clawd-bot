# Screensaver: the crab sails its boat left and right on a sea whose
# level IS your usage (0% = empty, 100% = full), bobbing across the
# waterline while there is still headroom. Shared by every display
# class: boards override the sprite substitutions for small screens.
# Requires idle.yaml (saver_active global, note_activity) and a UI
# package providing main_page + font_small.

# Sprite paths default to GitHub raw URLs so the package works when
# imported remotely (image file: paths resolve in the USER's config dir,
# not in the cloned package). Local dev entry points override the base
# with a repo-relative path; small-screen boards override size + scale.
substitutions:
  saver_sprite_base: "https://raw.githubusercontent.com/eldios/clawd-bot/main/assets/sprites"
  saver_sprite_size: "big"
  # Small/big pixel ratio - scales the hard-coded big sprite metrics in
  # the animation lambda. Keep in sync with tools/slice_spritesheet.py.
  saver_sprite_scale: "1.0"
  saver_boat_w: "96"
  saver_boat_h: "51"

image:
  - file: ${saver_sprite_base}/boat-${saver_sprite_size}-r.png
    id: spr_boat_r
    type: RGB565
    transparency: alpha_channel
  - file: ${saver_sprite_base}/boat-${saver_sprite_size}-l.png
    id: spr_boat_l
    type: RGB565
    transparency: alpha_channel
  - file: ${saver_sprite_base}/cloud.png
    id: spr_cloud
    type: RGB565
    transparency: alpha_channel
  - file: ${saver_sprite_base}/moon.png
    id: spr_moon
    type: RGB565
    transparency: alpha_channel
  - file: ${saver_sprite_base}/wave.png
    id: spr_wave
    type: RGB565
    transparency: alpha_channel
  # Fauna (see tools/slice_spritesheet.py): directional species ship -r/-l
  # pairs, symmetric ones a single file.
  - file: ${saver_sprite_base}/fish-orange-${saver_sprite_size}-r.png
    id: spr_fish_orange_r
    type: RGB565
    transparency: alpha_channel
  - file: ${saver_sprite_base}/fish-orange-${saver_sprite_size}-l.png
    id: spr_fish_orange_l
