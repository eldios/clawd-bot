# Screensaver: the crab sails its boat left and right on a sea whose
# level IS your usage (0% = empty, 100% = full), bobbing across the
# waterline while there is still headroom. Shared by every display
# class: boards override the sprite substitutions for small screens.
# Requires idle.yaml (saver_active global, note_activity) and a UI
# package providing main_page + font_small.

substitutions:
  saver_boat_r_file: "assets/sprites/boat-big-r.png"
  saver_boat_l_file: "assets/sprites/boat-big-l.png"
  saver_boat_w: "96"
  saver_boat_h: "51"

image:
  - file: ${saver_boat_r_file}
    id: spr_boat_r
    type: RGB565
    transparency: alpha_channel
  - file: ${saver_boat_l_file}
    id: spr_boat_l
    type: RGB565
    transparency: alpha_channel
  - file: assets/sprites/cloud.png
    id: spr_cloud
    type: RGB565
    transparency: alpha_channel
  - file: assets/sprites/moon.png
    id: spr_moon
    type: RGB565
    transparency: alpha_channel
  - file: assets/sprites/wave.png
    id: spr_wave
    type: RGB565
    transparency: alpha_channel

# Sky decoration settings - HA config entities, persisted in NVS.
switch:
  - platform: template
    id: saver_stars
    name: "Saver Stars"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
  - platform: template
    id: saver_moon
    name: "Saver Moon"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

number:
  - platform: template
    id: saver_cloud_count
    name: "Saver Clouds"
    entity_category: config
    min_value: 0
    max_value: 16
    step: 1
    initial_value: 3
    restore_value: true
    optimistic: true
  - platform: template
    id: saver_star_count
    name: "Saver Stars Count"
    entity_category: config
    min_value: 0
    max_value: 16
    step: 1
    initial_value: 12
    restore_value: true
    optimistic: true
  - platform: template
    id: saver_cloud_speed_min
    name: "Saver Cloud Speed Min"
    entity_category: config
    unit_of_measurement: "px/s"
    min_value: 1
    max_value: 30
    step: 1
    initial_value: 2
    restore_value: true
    optimistic: true
  - platform: template
    id: saver_cloud_speed_max
    name: "Saver Cloud Speed Max"
    entity_category: config
    unit_of_measurement: "px/s"
    min_value: 1
    max_value: 30
    step: 1
    initial_value: 5
    restore_value: true
    optimistic: true

script:
  - id: toggle_saver
    mode: single
    then:
      - script.execute: note_activity
      - if:
          condition:
            lambda: "return id(saver_active);"
          then:
            - lvgl.page.show: main_page
          else:
            - lvgl.page.show: saver_page

lvgl:
  pages:
    - id: saver_page
      bg_color: 0x0A0A14
      # Wave tiles intentionally overflow the right edge; without this the
      # page turns scrollable and LVGL draws a drifting scrollbar.
      scrollbar_mode: "off"
      scrollable: false
      on_load:
        - lambda: "id(saver_active) = true;"
      on_unload:
        - lambda: "id(saver_active) = false;"
      widgets:
        # Full-page tap target: any touch leaves the screensaver.
        - obj:
            id: saver_tap
            x: 0
            y: 0
            width: 100%
            height: 100%
            bg_opa: TRANSP
            border_width: 0
            on_click:
              - script.execute: toggle_saver
        # Stars: tiny dots, twinkling in the anim lambda, hidden underwater.
