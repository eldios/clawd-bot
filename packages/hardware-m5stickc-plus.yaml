# M5StickC Plus hardware: AXP192 PMU, ST7789v2 135x240 LCD, two buttons.
# Pin sources: devices.esphome.io m5stack-m5stickc-plus page (display/SPI/
# buttons) + M5Stack's official axp192 ESPHome component (rails; on the
# StickC family LDO2 feeds the backlight, LDO3 the panel logic).

i2c:
  - id: bsp_bus
    sda: GPIO21
    scl: GPIO22

spi:
  - id: spi_bus
    clk_pin: GPIO13
    mosi_pin: GPIO15

external_components:
  - source: github://m5stack/esphome-yaml/components
    components: [axp192]
    refresh: 1d

axp192:
  id: axp192_pmu
  i2c_id: bsp_bus

output:
  # Backlight rail - dimmable.
  - platform: axp192
    type: range
    channel: DLDO2
    id: lcd_backlight_output
    min_voltage: 2500
    max_voltage: 3000
  # Panel logic rail - fixed on.
  - platform: axp192
    channel: DLDO3
    id: lcd_logic_power
    voltage: 3000

light:
  - platform: monochromatic
    id: lcd_backlight
    name: "LCD Backlight"
    output: lcd_backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

sensor:
  - platform: axp192
    id: axp192_sensor
    battery_level:
      name: "Battery Level"
      id: battery_level
    battery_charging:
      name: "Battery Charging"
      id: battery_charging

binary_sensor:
  # Front button (BtnA): force a refresh.
  - platform: gpio
    id: btn_a
    pin:
      number: GPIO37
      inverted: true
    on_press:
      - script.execute: poll_usage
  # Side button (BtnB): reserved for future use.
  - platform: gpio
    id: btn_b
    internal: true
    pin:
      number: GPIO39
      inverted: true

display:
  # mipi_spi (not the legacy st7789v): its MADCTL hardware rotation is what
  # LVGL drives natively - the legacy driver plus LVGL software rotation
  # produced a wrapped/striped frame on this panel. T-DISPLAY preset = the
  # same ST7789 135x240 glass as the StickC Plus.
  - platform: mipi_spi
    id: main_lcd
    model: T-DISPLAY
    cs_pin: GPIO5
    dc_pin: GPIO23
    reset_pin: GPIO18
    # Rotation lives in the LVGL block (LVGL forbids display-level rotation).
    update_interval: never
    auto_clear_enabled: false
