# Local development entry point for the M5StickC Plus - wifi + token from
# secrets.yaml. See README.md for the ESPHome Builder adoption path.

substitutions:
  claude_token: !secret claude_token
  # Local dev: in-repo component sources instead of GitHub.
  tokentide_components_source: "components"
  # Local dev: repo sprites instead of the GitHub raw URLs.
  saver_sprite_base: "assets/sprites"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    password: !secret ap_password

# Dev: full logs on the wire (the package default is INFO).
logger:
  level: DEBUG

packages:
  board: !include boards/m5stickc-plus.yaml
  # lang: !include lang/it.yaml

api:

ota:
  - platform: esphome

captive_portal:

# Dev QA: GET http://<ip>:8081/screenshot (see tools/screenshot.sh).
# Dev-only component, deliberately not part of the published package.
external_components:
  - source: components
    components: [tokentide_screenshot]

tokentide_screenshot:
